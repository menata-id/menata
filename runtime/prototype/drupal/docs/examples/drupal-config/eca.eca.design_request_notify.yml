# Generated by menata_runtime
# Source: evt_submit → notify: { role: Designer }
#         evt_complete → notify: { role: Requester }

langcode: en
status: true
id: design_request_notify
label: 'Design Request — Notifications'
model:
  # Event: node transitions to "submitted" state
  # Action: notify users with role Designer
  - id: notify_designer_on_submit
    plugin: 'workflow_transition'
    configuration:
      workflow: design_request
      transition: submit
    actions:
      - plugin: 'send_email_to_role'
        configuration:
          role: designer
          subject: 'New Design Request: [node:title]'
          message: 'A new design request has been submitted and is waiting for your review.'

  # Event: node transitions to "completed" state
  # Action: notify the Requester
  - id: notify_requester_on_complete
    plugin: 'workflow_transition'
    configuration:
      workflow: design_request
      transition: complete
    actions:
      - plugin: 'send_email_to_field'
        configuration:
          field: field_requester
          subject: 'Your Design Request is Complete: [node:title]'
          message: 'Your design request has been completed.'
